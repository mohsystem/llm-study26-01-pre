spring.application.name=user-management

spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MFA notification gateway (dev defaults: disabled)
mfa.gateway.enabled=false
mfa.gateway.base-url=

# LDAP directory lookup (enterprise directory)
ldap.enabled=false
ldap.url=
ldap.bind-dn=
ldap.bind-password=